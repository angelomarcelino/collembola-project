name: Deploy Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy data contract into website/public
        run: |
          mkdir -p website/public/data website/public/images
          cp scraper/data/animals.json website/public/data/
          cp -r scraper/images/. website/public/images/ 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        working-directory: website
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - uses: actions/deploy-pages@v4
        id: deployment
